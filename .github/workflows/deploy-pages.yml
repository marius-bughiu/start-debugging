name: Deploy Astro site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build
        working-directory: site
        env:
          # Giscus comments config. These IDs are not secrets — they ship in
          # the deployed HTML so visitors can hit GitHub's Discussions API.
          # See site/src/components/Giscus.astro and site/.env.example.
          PUBLIC_GISCUS_REPO: marius-bughiu/start-debugging
          PUBLIC_GISCUS_REPO_ID: R_kgDOQ3cH_A
          PUBLIC_GISCUS_CATEGORY: Blog comments
          PUBLIC_GISCUS_CATEGORY_ID: DIC_kwDOQ3cH_M4C7sYA
          PUBLIC_GISCUS_THEME: https://startdebugging.net/giscus.css
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5